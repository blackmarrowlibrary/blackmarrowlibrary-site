<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackmarrow Library</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: #111;
      color: #e8e0c8;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #entry {
      min-height: 100vh;
      background: radial-gradient(circle at center, #222 0%, #050505 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
    }

    .entry-logo {
      width: 280px;
      max-width: 80vw;
      filter: brightness(0) invert(1);
      cursor: pointer;
    }

    .enter-link {
      margin-top: 24px;
      font-size: 22px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f2f2f2;
      cursor: pointer;
    }

    #site {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 40%),
        #15120f;
    }

    .menu {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px;
      border-bottom: 2px solid #8b816f;
      background: #d8d2c3;
    }

    .menu a {
      padding: 10px 18px;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9b761f;
      text-shadow: 1px 1px 0 #fff3b0, -1px -1px 0 #3a2a08;
    }

    main {
      flex: 1;
      padding: 48px 22px 80px;
      max-width: 760px;
      width: calc(100% - 44px);
      margin: 0 auto;
      line-height: 1.65;
    }

    h1 {
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 28px;
      color: #d6c48a;
      border-bottom: 1px solid rgba(214,196,138,0.35);
      padding-bottom: 12px;
    }

    .sterile {
      text-align: center;
      margin-top: 80px;
      font-size: 20px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #d8d8d8;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin: 8px 0 18px;
      background: #eee8d6;
      border: 1px solid #8b816f;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
    }

    textarea {
      min-height: 140px;
    }

    button {
      padding: 10px 18px;
      font-family: Georgia, "Times New Roman", serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      background: #d8d2c3;
      border: 1px solid #8b816f;
      color: #3a2a08;
    }

    .staff-box {
      max-width: 360px;
      margin: 60px auto;
      padding: 24px;
      border: 1px solid rgba(214,196,138,0.35);
      background: rgba(0,0,0,0.18);
    }

    .file-list {
      font-family: "Courier New", monospace;
      font-size: 14px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(214,196,138,0.25);
      padding: 18px;
      overflow-x: auto;
    }

    .file-list a {
      color: #c9c1ad;
      text-decoration: underline;
    }

    .file-list a.dead {
      color: #4f4a40;
      text-decoration: none;
    }

    .file-note {
      font-family: "Courier New", monospace;
      font-size: 13px;
      color: #8b816f;
      margin-bottom: 18px;
    }

    #sound-toggle {
      position: fixed;
      right: 10px;
      bottom: 34px;
      z-index: 999;
      font-family: "Courier New", monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 3px 6px;
      color: #777;
      background: #050505;
      border: 1px solid #222;
      opacity: 0.55;
    }

    #sound-toggle:hover {
      opacity: 0.95;
      color: #ccc;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 14px;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #c9c1ad;
      background: rgba(0,0,0,0.88);
      border-top: 1px solid rgba(255,255,255,0.12);
      text-align: center;
    }
  </style>
</head>

<body>

  <section id="entry">
    <a href="#home" onclick="enterSite()">
      <img src="logo.png" alt="Blackmarrow Library" class="entry-logo">
    </a>
    <a href="#home" class="enter-link" onclick="enterSite()">Enter</a>
  </section>

  <section id="site">
    <nav class="menu">
      <a href="#home">Home</a>
      <a href="#archive">Archive</a>
      <a href="#files">Files</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
      <a href="#staff">Staff</a>
    </nav>

    <main id="content"></main>

    <audio id="archive-audio" loop preload="auto">
      <source src="audio/archive_01.m4a" type="audio/mp4">
    </audio>

    <button id="sound-toggle" onclick="toggleSound()">sound: off</button>

    <footer>
      PUBLIC ACCESS LOG: <span id="counter">027</span>
    </footer>
  </section>

  <script>
    const content = document.getElementById("content");
    const audio = document.getElementById("archive-audio");
    const soundToggle = document.getElementById("sound-toggle");

    audio.volume = 0.08;

    const pages = {
      home: `
        <h1>Blackmarrow Library</h1>
        <p>
          Public-facing access has been provisionally restored.
          Selected holdings, records, fragments, and deaccessioned materials
          may appear here without prior notice.
        </p>
        <p>
          Please consult the available index when possible.
        </p>
      `,

      archive: `
        <div class="sterile">Index Unavailable</div>
      `,

      files: `
        <h1>Files</h1>

        <div class="file-note">
          directory index restored from partial migration backup<br>
          several referenced files remain unavailable
        </div>

        <div class="file-list">
<pre>
/files/

<a href="files/COL-2019-09_SELECTED_HOLDINGS.pdf" target="_blank">COL-2019-09_SELECTED_HOLDINGS.pdf</a>
<a href="files/04_2025_hosting_migration.pdf" target="_blank">04_2025_hosting_migration.pdf</a>
<a href="files/2017FY Operating Budget.jpg" target="_blank">2017FY Operating Budget.jpg</a>

<a class="dead" href="files/legacy/ACC-1998-031_SCAN-01.pdf">ACC-1998-031_SCAN-01.pdf</a>
<a class="dead" href="files/legacy/CATALOG_LEGACY_INDEX.htm">CATALOG_LEGACY_INDEX.htm</a>
<a class="dead" href="files/legacy/VISITOR_LOG_2004-2008.txt">VISITOR_LOG_2004-2008.txt</a>
<a class="dead" href="files/periodicals/PERIODICALS_BOX_03.pdf">PERIODICALS_BOX_03.pdf</a>
<a class="dead" href="files/staff/STAFF_NOTICE_2011-08.pdf">STAFF_NOTICE_2011-08.pdf</a>
<a class="dead" href="files/accessions/ACCESSIONS_1998_PARTIAL.xls">ACCESSIONS_1998_PARTIAL.xls</a>
<a class="dead" href="files/audio/AUDIO_REEL_INDEX_A.txt">AUDIO_REEL_INDEX_A.txt</a>
<a class="dead" href="files/catalog/MICROFILM_TRANSFER_NOTES.doc">MICROFILM_TRANSFER_NOTES.doc</a>
<a class="dead" href="files/internal/READING_ROOM_INCIDENTS_2010.pdf">READING_ROOM_INCIDENTS_2010.pdf</a>
<a class="dead" href="files/internal/DONOR_CORRESPONDENCE_REDACTED.pdf">DONOR_CORRESPONDENCE_REDACTED.pdf</a>
<a class="dead" href="files/tmp/TEMP_DIRECTORY_BACKUP_OLD.htm">TEMP_DIRECTORY_BACKUP_OLD.htm</a>
<a class="dead" href="files/tmp/SCAN_QUEUE_UNSORTED.zip">SCAN_QUEUE_UNSORTED.zip</a>
</pre>
        </div>
      `,

      about: `
        <h1>About</h1>
        <p>
          Blackmarrow Library maintains an expansive and continually growing
          collection of objects, texts, images, fragments, and irregular
          materials curated from sources across the world.
        </p>
        <p>
          The collection is assembled through acquisition, recovery,
          correspondence, deaccession, private transfer, and other less
          easily categorized means.
        </p>
        <p>
          Public access is limited. Cataloguing is ongoing.
        </p>
      `,

      contact: `
        <h1>Contact</h1>
        <form onsubmit="sendMail(event)">
          <label>Name</label>
          <input type="text" id="name" required>

          <label>Email</label>
          <input type="email" id="email" required>

          <label>Question or Comment</label>
          <textarea id="message" required></textarea>

          <button type="submit">Submit Inquiry</button>
        </form>
      `,

      staff: `
        <h1>Staff Access</h1>
        <div class="staff-box">
          <label>Employee Number</label>
          <input type="text">

          <label>Pass Code</label>
          <input type="password">

          <button onclick="restricted()">Submit</button>
        </div>
      `
    };

    function enterSite() {
      document.getElementById("entry").style.display = "none";
      document.getElementById("site").style.display = "flex";
      loadPage();
      startSound();
    }

    function loadPage() {
      const page = location.hash.replace("#", "") || "home";
      content.innerHTML = pages[page] || pages.home;
    }

    window.addEventListener("hashchange", () => {
      if (location.hash) enterSite();
      loadPage();
    });

    function startSound() {
      const soundPref = localStorage.getItem("bml_sound");

      if (soundPref === "off") {
        soundToggle.textContent = "sound: off";
        return;
      }

      localStorage.setItem("bml_sound", "on");
      audio.play().then(() => {
        soundToggle.textContent = "sound: on";
      }).catch(() => {
        soundToggle.textContent = "sound: off";
      });
    }

    function toggleSound() {
      if (audio.paused) {
        localStorage.setItem("bml_sound", "on");
        audio.play();
        soundToggle.textContent = "sound: on";
      } else {
        localStorage.setItem("bml_sound", "off");
        audio.pause();
        soundToggle.textContent = "sound: off";
      }
    }

    function restricted() {
      alert("Restricted");
    }

    function sendMail(event) {
      event.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;

      const subject = encodeURIComponent("Blackmarrow Library Inquiry");
      const body = encodeURIComponent(
        "Name: " + name + "\n" +
        "Email: " + email + "\n\n" +
        message
      );

      window.location.href =
        "mailto:blackmarrowlibrary@gmail.com?subject=" + subject + "&body=" + body;
    }

    function updateCounter() {
      const min = 11;
      const max = 1500;
      const now = Date.now();

      let value = parseInt(localStorage.getItem("accessLogValue")) || 27;
      let lastUpdate = parseInt(localStorage.getItem("accessLogLastUpdate")) || 0;

      const updateEvery = 1000 * 60 * 60 * 6;

      if (now - lastUpdate > updateEvery) {
        let change = Math.floor(Math.random() * 45) + 3;

        if (Math.random() < 0.5) {
          change = -change;
        }

        value += change;

        if (value < min) value = min + Math.floor(Math.random() * 30);
        if (value > max) value = max - Math.floor(Math.random() * 30);

        localStorage.setItem("accessLogValue", value);
        localStorage.setItem("accessLogLastUpdate", now);
      }

      document.getElementById("counter").textContent =
        String(value).padStart(3, "0");
    }

    updateCounter();

    if (location.hash) {
      enterSite();
    }
  </script>

</body>
</html>
