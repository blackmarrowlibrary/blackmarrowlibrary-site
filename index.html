<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackmarrow Library</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: #111;
      color: #e8e0c8;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #entry {
      min-height: 100vh;
      background: radial-gradient(circle at center, #222 0%, #050505 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
    }

    .entry-logo {
      width: 280px;
      max-width: 80vw;
      filter: brightness(0) invert(1);
      cursor: pointer;
    }

    .enter-link {
      margin-top: 24px;
      font-size: 22px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f2f2f2;
      cursor: pointer;
    }

    .enter-link:hover {
      opacity: 0.7;
    }

    #site {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 40%),
        #15120f;
    }

    .menu {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px;
      border-bottom: 2px solid #8b816f;
      background:
        linear-gradient(115deg,
          rgba(255,255,255,.75) 0%,
          rgba(210,206,196,.45) 18%,
          rgba(120,116,108,.25) 19%,
          rgba(245,242,232,.65) 32%,
          rgba(95,91,86,.18) 33%,
          rgba(232,228,216,.7) 50%,
          rgba(120,116,108,.25) 51%,
          rgba(250,247,238,.8) 72%,
          rgba(95,90,82,.2) 73%,
          rgba(220,216,204,.65) 100%
        ),
        #d8d2c3;
    }

    .menu a {
      padding: 10px 18px;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9b761f;
      text-shadow:
        1px 1px 0 #fff3b0,
        -1px -1px 0 #3a2a08;
      border-left: 1px solid rgba(0,0,0,0.18);
      border-right: 1px solid rgba(255,255,255,0.45);
    }

    .menu a:hover {
      background: rgba(0,0,0,0.08);
    }

    main {
      flex: 1;
      padding: 48px 22px 80px;
      max-width: 760px;
      width: calc(100% - 44px);
      margin: 0 auto;
      line-height: 1.65;
    }

    h1 {
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 28px;
      color: #d6c48a;
      border-bottom: 1px solid rgba(214,196,138,0.35);
      padding-bottom: 12px;
    }

    .sterile {
      text-align: center;
      margin-top: 80px;
      font-size: 20px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #d8d8d8;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin: 8px 0 18px;
      background: #eee8d6;
      border: 1px solid #8b816f;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
    }

    textarea {
      min-height: 140px;
    }

    button {
      padding: 10px 18px;
      font-family: Georgia, "Times New Roman", serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      background: #d8d2c3;
      border: 1px solid #8b816f;
      color: #3a2a08;
    }

    .staff-box {
      max-width: 360px;
      margin: 60px auto;
      padding: 24px;
      border: 1px solid rgba(214,196,138,0.35);
      background: rgba(0,0,0,0.18);
    }

    .apache-index {
      background: #f7f7f7;
      color: #000;
      font-family: "Times New Roman", Times, serif;
      padding: 18px;
      margin: -48px -22px -80px;
      min-height: calc(100vh - 120px);
      overflow-x: auto;
    }

    .apache-index h1 {
      color: #000;
      border: none;
      font-family: "Times New Roman", Times, serif;
      font-size: 34px;
      letter-spacing: 0;
      text-transform: none;
      padding-bottom: 8px;
      margin-top: 0;
    }

    .apache-index table {
      border-collapse: collapse;
      font-family: "Courier New", monospace;
      font-size: 14px;
      min-width: 760px;
    }

    .apache-index th,
    .apache-index td {
      padding: 3px 14px 3px 0;
      white-space: nowrap;
      text-align: left;
      font-weight: normal;
    }

    .apache-index th {
      border-bottom: 1px solid #999;
    }

    .apache-index a {
      color: #0000ee;
      text-decoration: underline;
    }

    .apache-index a:visited {
      color: #551a8b;
    }

    .apache-index address {
      margin-top: 18px;
      border-top: 1px solid #999;
      padding-top: 8px;
      font-size: 14px;
      color: #000;
    }

    #sound-toggle {
      position: fixed;
      right: 10px;
      bottom: 34px;
      z-index: 999;
      font-family: "Courier New", monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 3px 6px;
      color: #777;
      background: #050505;
      border: 1px solid #222;
      opacity: 0.55;
    }

    #sound-toggle:hover {
      opacity: 0.95;
      color: #ccc;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 14px;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #c9c1ad;
      background: rgba(0,0,0,0.88);
      border-top: 1px solid rgba(255,255,255,0.12);
      text-align: center;
    }
  </style>
</head>

<body>

  <section id="entry">
    <a href="#home" onclick="enterSite()">
      <img src="logo.png" alt="Blackmarrow Library" class="entry-logo">
    </a>
    <a href="#home" class="enter-link" onclick="enterSite()">Enter</a>
  </section>

  <section id="site">
    <nav class="menu">
      <a href="#home">Home</a>
      <a href="#archive">Archive</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
      <a href="#staff">Staff</a>
    </nav>

    <main id="content"></main>

    <audio id="archive-audio" loop preload="auto">
      <source id="audio-source" src="audio/archive_01.m4a" type="audio/mp4">
    </audio>

    <button id="sound-toggle" onclick="toggleSound()">sound: off</button>

    <footer>
      PUBLIC ACCESS LOG: <span id="counter">027</span>
    </footer>
  </section>

  <script>
    const content = document.getElementById("content");
const audio = document.getElementById("archive-audio");
const audioSource = document.getElementById("audio-source");
const soundToggle = document.getElementById("sound-toggle");

audio.volume = 0.35;

function selectArchiveTrack() {
  const firstVisit = localStorage.getItem("bml_first_visit_complete");

  if (!firstVisit) {
    localStorage.setItem("bml_first_visit_complete", "true");
    return "audio/archive_01.m4a";
  }

  const now = new Date();
  const day = now.getDate();
  const hour = now.getHours();
  const minute = now.getMinutes();

  const lateWindow =
    hour >= 22 || hour < 6 || (hour === 6 && minute <= 45);

  const specialDates = [1, 3, 15, 27];

  const yesterday = new Date(now);
  yesterday.setDate(now.getDate() - 1);
  const yesterdayDay = yesterday.getDate();

  const specialOvernight =
    (specialDates.includes(day) && (hour < 6 || (hour === 6 && minute <= 45))) ||
    (specialDates.includes(yesterdayDay) && hour >= 22);

  if (lateWindow && specialOvernight) {
    return "audio/archive_05.m4a";
  }

  if (hour >= 6 && hour < 12) {
    return "audio/archive_02.m4a";
  }

  if (hour >= 12 && hour < 18) {
    return "audio/archive_03.m4a";
  }

  return "audio/archive_04.m4a";
}

audioSource.src = selectArchiveTrack();
audio.load();

    audio.volume = 0.35;

    const pages = {
      home: `
        <h1>Blackmarrow Library</h1>
        <p>
          Public-facing access has been provisionally restored.
          Selected holdings, records, fragments, and deaccessioned materials
          may appear here without prior notice.
        </p>
        <p>
          Please consult the available index when possible.
        </p>
      `,

      archive: `
        <div class="sterile">Index Unavailable</div>

        <div style="
          margin-top:80px;
          text-align:center;
          font-family:'Courier New', monospace;
          font-size:12px;
          color:#666;
          letter-spacing:0.08em;
        ">
          partial directory restoration detected<br>
          catalog restoration incomplete<br><br>

          <a href="#files"
             style="
             color:#777;
             text-decoration:underline;
             ">
             view restored index
          </a>
        </div>
      `,

      files: `
        <div class="apache-index">
          <h1>Index of /files/</h1>

          <table>
            <tr>
              <th></th>
              <th><a href="#">Name</a></th>
              <th><a href="#">Last modified</a></th>
              <th><a href="#">Size</a></th>
              <th><a href="#">Description</a></th>
            </tr>

            <tr>
              <td>↩</td>
              <td><a href="#archive">Parent Directory</a></td>
              <td>-</td>
              <td>-</td>
              <td></td>
            </tr>

            <tr><td>▣</td><td><a href="files/COL-2019-09_SELECTED_HOLDINGS.pdf" target="_blank">COL-2019-09_SELECTED_HOLDINGS.pdf</a></td><td>22-Sep-2019 14:03</td><td>1.2M</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/04_2025_hosting_migration.pdf" target="_blank">04_2025_hosting_migration.pdf</a></td><td>22-Apr-2025 09:41</td><td>842K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/2017FY Operating Budget.jpg" target="_blank">2017FY Operating Budget.jpg</a></td><td>15-Jan-2018 16:22</td><td>611K</td><td></td></tr>
            <tr><td>▣</td><td><a href="images/Visitor Form.jpg" target="_blank">VIS-2018-01_VISITOR_FORM.jpg</a></td><td>18-Jun-2018 11:08</td><td>734K</td><td></td></tr>
            <tr><td>▣</td><td><a href="images/visitor badge.jpg" target="_blank">VIS-2018-02_TEMPORARY_BADGE.jpg</a></td><td>18-Jun-2018 11:14</td><td>690K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/legacy/ACC-1998-031_SCAN-01.pdf" target="_blank">ACC-1998-031_SCAN-01.pdf</a></td><td>11-Feb-2004 03:18</td><td>418K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/legacy/CATALOG_LEGACY_INDEX.htm" target="_blank">CATALOG_LEGACY_INDEX.htm</a></td><td>04-Aug-2001 22:09</td><td>63K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/legacy/VISITOR_LOG_2004-2008.txt" target="_blank">VISITOR_LOG_2004-2008.txt</a></td><td>17-Nov-2008 10:44</td><td>21K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/periodicals/PERIODICALS_BOX_03.pdf" target="_blank">PERIODICALS_BOX_03.pdf</a></td><td>29-May-2009 01:12</td><td>7.4M</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/staff/STAFF_NOTICE_2011-08.pdf" target="_blank">STAFF_NOTICE_2011-08.pdf</a></td><td>08-Aug-2011 08:22</td><td>184K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/accessions/ACCESSIONS_1998_PARTIAL.xls" target="_blank">ACCESSIONS_1998_PARTIAL.xls</a></td><td>03-Mar-1999 17:31</td><td>112K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/audio/AUDIO_REEL_INDEX_A.txt" target="_blank">AUDIO_REEL_INDEX_A.txt</a></td><td>12-Dec-2010 19:02</td><td>14K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/catalog/MICROFILM_TRANSFER_NOTES.doc" target="_blank">MICROFILM_TRANSFER_NOTES.doc</a></td><td>30-Jun-2014 12:56</td><td>87K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/internal/READING_ROOM_INCIDENTS_2010.pdf" target="_blank">READING_ROOM_INCIDENTS_2010.pdf</a></td><td>19-Oct-2010 06:40</td><td>329K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/internal/DONOR_CORRESPONDENCE_REDACTED.pdf" target="_blank">DONOR_CORRESPONDENCE_REDACTED.pdf</a></td><td>02-Feb-2012 23:15</td><td>901K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/tmp/TEMP_DIRECTORY_BACKUP_OLD.htm" target="_blank">TEMP_DIRECTORY_BACKUP_OLD.htm</a></td><td>14-Apr-2025 04:03</td><td>44K</td><td></td></tr>
            <tr><td>▣</td><td><a href="files/tmp/SCAN_QUEUE_UNSORTED.zip" target="_blank">SCAN_QUEUE_UNSORTED.zip</a></td><td>01-Jan-2016 00:00</td><td>18.7M</td><td></td></tr>
          </table>

          <address>
            Apache/2.2.0 (Win32) Server at blackmarrowlibrary.org Port 80
          </address>
        </div>
      `,

      about: `
        <h1>About</h1>
        <p>
          Blackmarrow Library maintains an expansive and continually growing
          collection of objects, texts, images, fragments, and irregular
          materials curated from sources across the world.
        </p>
        <p>
          The collection is assembled through acquisition, recovery,
          correspondence, deaccession, private transfer, and other less
          easily categorized means.
        </p>
        <p>
          Public access is limited. Cataloguing is ongoing.
        </p>
      `,

      contact: `
        <h1>Contact</h1>
        <form onsubmit="sendMail(event)">
          <label>Name</label>
          <input type="text" id="name" required>

          <label>Email</label>
          <input type="email" id="email" required>

          <label>Question or Comment</label>
          <textarea id="message" required></textarea>

          <button type="submit">Submit Inquiry</button>
        </form>
      `,

      staff: `
        <h1>Staff Access</h1>
        <div class="staff-box">
          <label>Employee Number</label>
          <input type="text">

          <label>Pass Code</label>
          <input type="password">

          <button onclick="restricted()">Submit</button>
        </div>
      `
    };

    function enterSite() {
      document.getElementById("entry").style.display = "none";
      document.getElementById("site").style.display = "flex";
      loadPage();
      startSound();
    }

    function loadPage() {
      const page = location.hash.replace("#", "") || "home";
      content.innerHTML = pages[page] || pages.home;
    }

    window.addEventListener("hashchange", () => {
      if (location.hash) enterSite();
      loadPage();
    });

    function startSound() {
      const soundPref = localStorage.getItem("bml_sound");

      if (soundPref === "off") {
        soundToggle.textContent = "sound: off";
        return;
      }

      localStorage.setItem("bml_sound", "on");
      audio.play().then(() => {
        soundToggle.textContent = "sound: on";
      }).catch(() => {
        soundToggle.textContent = "sound: off";
      });
    }

    function toggleSound() {
      if (audio.paused) {
        localStorage.setItem("bml_sound", "on");
        audio.play();
        soundToggle.textContent = "sound: on";
      } else {
        localStorage.setItem("bml_sound", "off");
        audio.pause();
        soundToggle.textContent = "sound: off";
      }
    }

    function restricted() {
      alert("Restricted");
    }

    function sendMail(event) {
      event.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;

      const subject = encodeURIComponent("Blackmarrow Library Inquiry");
      const body = encodeURIComponent(
        "Name: " + name + "\n" +
        "Email: " + email + "\n\n" +
        message
      );

      window.location.href =
        "mailto:blackmarrowlibrary@gmail.com?subject=" + subject + "&body=" + body;
    }

    function updateCounter() {
      const min = 11;
      const max = 1500;
      const now = Date.now();

      let value = parseInt(localStorage.getItem("accessLogValue")) || 27;
      let lastUpdate = parseInt(localStorage.getItem("accessLogLastUpdate")) || 0;

      const updateEvery = 1000 * 60 * 60 * 6;

      if (now - lastUpdate > updateEvery) {
        let change = Math.floor(Math.random() * 45) + 3;

        if (Math.random() < 0.5) {
          change = -change;
        }

        value += change;

        if (value < min) value = min + Math.floor(Math.random() * 30);
        if (value > max) value = max - Math.floor(Math.random() * 30);

        localStorage.setItem("accessLogValue", value);
        localStorage.setItem("accessLogLastUpdate", now);
      }

      document.getElementById("counter").textContent =
        String(value).padStart(3, "0");
    }

    updateCounter();

    if (location.hash) {
      enterSite();
    }
  </script>

</body>
</html>
