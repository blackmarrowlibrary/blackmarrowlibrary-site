<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackmarrow Library</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: #111;
      color: #e8e0c8;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ENTRY PAGE */

    #entry {
      min-height: 100vh;
      background: radial-gradient(circle at center, #222 0%, #050505 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
    }

    .entry-logo {
      width: 280px;
      max-width: 80vw;
      filter: brightness(0) invert(1);
      cursor: pointer;
    }

    .enter-link {
      margin-top: 24px;
      font-size: 22px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f2f2f2;
      cursor: pointer;
    }

    .enter-link:hover {
      opacity: 0.7;
    }

    /* MAIN SITE */

    #site {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 40%),
        #15120f;
    }

    .menu {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px;
      border-bottom: 2px solid #8b816f;

      background:
        linear-gradient(115deg,
          rgba(255,255,255,.75) 0%,
          rgba(210,206,196,.45) 18%,
          rgba(120,116,108,.25) 19%,
          rgba(245,242,232,.65) 32%,
          rgba(95,91,86,.18) 33%,
          rgba(232,228,216,.7) 50%,
          rgba(120,116,108,.25) 51%,
          rgba(250,247,238,.8) 72%,
          rgba(95,90,82,.2) 73%,
          rgba(220,216,204,.65) 100%
        ),
        #d8d2c3;
    }

    .menu a {
      padding: 10px 18px;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9b761f;

      text-shadow:
        1px 1px 0 #fff3b0,
        -1px -1px 0 #3a2a08;

      border-left: 1px solid rgba(0,0,0,0.18);
      border-right: 1px solid rgba(255,255,255,0.45);
    }

    .menu a:hover {
      background: rgba(0,0,0,0.08);
    }

    main {
      flex: 1;
      padding: 48px 22px 80px;
      max-width: 760px;
      width: calc(100% - 44px);
      margin: 0 auto;
      line-height: 1.65;
    }

    h1 {
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 28px;
      color: #d6c48a;
      border-bottom: 1px solid rgba(214,196,138,0.35);
      padding-bottom: 12px;
    }

    .sterile {
      text-align: center;
      margin-top: 80px;
      font-size: 20px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #d8d8d8;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin: 8px 0 18px;
      background: #eee8d6;
      border: 1px solid #8b816f;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
    }

    textarea {
      min-height: 140px;
    }

    button {
      padding: 10px 18px;
      font-family: Georgia, "Times New Roman", serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      background: #d8d2c3;
      border: 1px solid #8b816f;
      color: #3a2a08;
    }

    .staff-box {
      max-width: 360px;
      margin: 60px auto;
      padding: 24px;
      border: 1px solid rgba(214,196,138,0.35);
      background: rgba(0,0,0,0.18);
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 14px;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #c9c1ad;
      background: rgba(0,0,0,0.88);
      border-top: 1px solid rgba(255,255,255,0.12);
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- ENTRY SCREEN -->
  <section id="entry">
    <a href="#home" onclick="enterSite()">
      <img src="logo.png" alt="Blackmarrow Library" class="entry-logo">
    </a>
    <a href="#home" class="enter-link" onclick="enterSite()">Enter</a>
  </section>

  <!-- MAIN SITE -->
  <section id="site">
    <nav class="menu">
      <a href="#home">Home</a>
      <a href="#archive">Archive</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
      <a href="#staff">Staff</a>
    </nav>

    <main id="content"></main>

    <footer>
      PUBLIC ACCESS LOG: <span id="counter">027</span>
    </footer>
  </section>

  <script>
    const content = document.getElementById("content");

    const pages = {
      home: `
        <h1>Blackmarrow Library</h1>
        <p>
          Public-facing access has been provisionally restored.
          Selected holdings, records, fragments, and deaccessioned materials
          may appear here without prior notice.
        </p>
        <p>
          Please consult the available index when possible.
        </p>
      `,

      archive: `
        <div class="sterile">Index Unavailable</div>
      `,

      about: `
        <h1>About</h1>
        <p>
          Blackmarrow Library maintains an expansive and continually growing
          collection of objects, texts, images, fragments, and irregular
          materials curated from sources across the world.
        </p>
        <p>
          The collection is assembled through acquisition, recovery,
          correspondence, deaccession, private transfer, and other less
          easily categorized means.
        </p>
        <p>
          Public access is limited. Cataloguing is ongoing.
        </p>
      `,

      contact: `
        <h1>Contact</h1>
        <form onsubmit="sendMail(event)">
          <label>Name</label>
          <input type="text" id="name" required>

          <label>Email</label>
          <input type="email" id="email" required>

          <label>Question or Comment</label>
          <textarea id="message" required></textarea>

          <button type="submit">Submit Inquiry</button>
        </form>
      `,

      staff: `
        <h1>Staff Access</h1>
        <div class="staff-box">
          <label>Employee Number</label>
          <input type="text">

          <label>Pass Code</label>
          <input type="password">

          <button onclick="restricted()">Submit</button>
        </div>
      `
    };

    function enterSite() {
      document.getElementById("entry").style.display = "none";
      document.getElementById("site").style.display = "flex";
      loadPage();
    }

    function loadPage() {
      const page = location.hash.replace("#", "") || "home";
      content.innerHTML = pages[page] || pages.home;
    }

    window.addEventListener("hashchange", () => {
      if (location.hash) enterSite();
      loadPage();
    });

    function restricted() {
      alert("Restricted");
    }

    function sendMail(event) {
      event.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;

      const subject = encodeURIComponent("Blackmarrow Library Inquiry");
      const body = encodeURIComponent(
        "Name: " + name + "\n" +
        "Email: " + email + "\n\n" +
        message
      );

      window.location.href =
        "mailto:blackmarrowlibrary@gmail.com?subject=" + subject + "&body=" + body;
    }

    /* PUBLIC ACCESS LOG */
    function updateCounter() {
      const min = 11;
      const max = 1500;
      const now = Date.now();

      let value = parseInt(localStorage.getItem("accessLogValue")) || 27;
      let lastUpdate = parseInt(localStorage.getItem("accessLogLastUpdate")) || 0;

      const updateEvery = 1000 * 60 * 60 * 6; // roughly every 6 hours

      if (now - lastUpdate > updateEvery) {
        let change = Math.floor(Math.random() * 45) + 3;

        if (Math.random() < 0.5) {
          change = -change;
        }

        value += change;

        if (value < min) value = min + Math.floor(Math.random() * 30);
        if (value > max) value = max - Math.floor(Math.random() * 30);

        localStorage.setItem("accessLogValue", value);
        localStorage.setItem("accessLogLastUpdate", now);
      }

      document.getElementById("counter").textContent =
        String(value).padStart(3, "0");
    }

    updateCounter();

    if (location.hash) {
      enterSite();
    }
  </script>

</body>
</html>
